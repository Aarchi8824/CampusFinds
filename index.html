<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusFind — Lost & Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a2e; }

    header {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid #e2e8f0;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; color: #1a1a2e; }
    header span { color: #718096; font-weight: 400; }

    .hero {
      text-align: center;
      padding: 5rem 2rem 4rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .hero h2 {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: #1a1a2e;
    }
    .hero h2 span { color: #3182ce; }
    .hero p {
      font-size: 1rem;
      color: #718096;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.9rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-blue { background: #3182ce; color: white; }
    .btn-outline { border: 2px solid #3182ce; color: #3182ce; }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 0 2rem;
    }

    .how {
      padding: 4rem 2rem;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .how h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #1a1a2e;
    }
    .how p.sub {
      color: #718096;
      margin-bottom: 3rem;
      font-size: 0.95rem;
    }

    .steps {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .step {
      flex: 1;
      min-width: 160px;
      max-width: 200px;
    }
    .step-num {
      width: 36px;
      height: 36px;
      background: #1a1a2e;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      margin: 0 auto 0.8rem;
    }
    .step h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
    .step p { font-size: 0.85rem; color: #718096; line-height: 1.5; }

    .notice {
      background: #ebf8ff;
      border-left: 4px solid #3182ce;
      padding: 1rem 1.5rem;
      max-width: 600px;
      margin: 2rem auto 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
      color: #2c5282;
      line-height: 1.6;
      text-align: left;
    }

    footer {
      border-top: 1px solid #e2e8f0;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #a0aec0;
      margin-top: 4rem;
    }
    footer a { color: #3182ce; text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <h1>CampusFind <span>— Lost & Found</span></h1>
  </header>

  <section class="hero">
    <h2>Lost something on <span>campus?</span></h2>
    <p>A simple open system for students to report and recover
